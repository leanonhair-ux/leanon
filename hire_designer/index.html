<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>LEANON — 디자이너 이력서</title>
<meta name="description" content="린온 성수 디자이너 채용 — 이력서 지원." />
<meta property="og:title" content="LEANON — 함께할 디자이너를 찾습니다" />
<meta property="og:description" content="린온 성수 디자이너 이력서 지원 페이지" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ color-scheme:light; --ink:#1c1a17; --muted:#8a8377; --line:#e2ddd5; --bg:#ffffff; --radius:12px; }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px; margin:0 auto; padding:32px 22px 120px}
  .brand{text-align:center; margin-bottom:26px}
  .brand img{width:170px; max-width:58%; height:auto; display:block; margin:0 auto}

  .title{display:flex; align-items:baseline; justify-content:space-between; gap:10px;
         padding-bottom:12px; border-bottom:2px solid var(--ink); margin-top:16px}
  .title h1{font-size:19px; letter-spacing:2px; font-weight:700}
  .title span{font-size:11px; color:var(--muted); text-align:right; line-height:1.4}

  .sec{margin-top:30px}
  .sec > h2{font-size:13px; letter-spacing:2.5px; font-weight:700; margin-bottom:4px}
  .sec > .secsub{font-size:12px; color:var(--muted); margin-bottom:16px}
  .field{margin-bottom:20px}
  .field > label.q{display:block; font-size:14.5px; font-weight:600; margin-bottom:9px}
  .field > label.q .req{color:#c0392b; margin-left:2px}
  .hint{color:var(--muted); font-weight:400; font-size:12px; margin-left:4px}
  .in{width:100%; border:none; border-bottom:1px solid var(--line); background:transparent;
      font-size:15px; padding:9px 2px; color:var(--ink); font-family:inherit}
  .in:focus{outline:none; border-bottom-color:var(--ink)}
  textarea.in{border:1px solid var(--line); border-radius:var(--radius); min-height:92px; padding:12px; resize:vertical}

  .consent{margin-top:34px; padding-top:20px; border-top:1px solid var(--line)}
  .consent .q{font-size:14px; font-weight:600}
  .consent .note{color:var(--muted); font-size:12px; margin:6px 0 12px; line-height:1.6}
  .opts{display:flex; flex-wrap:wrap; gap:8px}
  .chip{position:relative; border:1px solid var(--line); border-radius:999px;
        padding:10px 15px; font-size:14px; cursor:pointer; user-select:none; transition:.15s}
  .chip input{position:absolute; opacity:0; pointer-events:none}
  .chip:has(input:checked){background:var(--ink); color:#fff; border-color:var(--ink)}

  .submitbar{position:fixed; left:0; right:0; bottom:0; background:var(--bg);
             border-top:1px solid var(--line); padding:14px 22px calc(14px + env(safe-area-inset-bottom));}
  .submitbar .inner{max-width:560px; margin:0 auto}
  button.submit{width:100%; border:none; border-radius:12px; background:var(--ink); color:#fff;
                font-size:16px; font-weight:700; padding:16px 0; cursor:pointer; font-family:inherit}
  button.submit:disabled{opacity:.4}
  .done{display:none; text-align:center; padding:80px 22px}
  .done h2{font-size:22px; margin-bottom:12px}
  .done p{color:var(--muted); font-size:15px; line-height:1.7}
  .footer-tag{text-align:center; margin-top:40px; color:var(--muted); font-size:12px; letter-spacing:.5px}
</style>
</head>
<body>

<div class="wrap" id="formView">
  <div class="brand">
    <img src="../assets/brand/wordmark-dark.png" alt="LEANON"
      onerror="this.onerror=null; this.src='../logo.png'; this.onerror=function(){this.outerHTML='&lt;div style=&quot;font-size:32px;letter-spacing:6px;font-weight:800&quot;&gt;LEANON&lt;/div&gt;'}" />
  </div>

  <div class="title">
    <h1>DESIGNER RESUME</h1>
    <span>린온 성수 디자이너 채용<br/>함께할 분을 찾습니다</span>
  </div>

  <form id="hireForm">
    <div class="sec">
      <h2>INFORMATION</h2>
      <div class="secsub">인적사항</div>

      <div class="field">
        <label class="q" for="name">이름 <span class="req">*</span></label>
        <input class="in" id="name" name="name" type="text" required autocomplete="name" />
      </div>
      <div class="field">
        <label class="q" for="birth_mbti">생년월일 / MBTI <span class="req">*</span></label>
        <input class="in" id="birth_mbti" name="birth_mbti" type="text" required placeholder="예) 2001.03.21 / ENFP" />
      </div>
      <div class="field">
        <label class="q" for="phone">연락처 <span class="req">*</span></label>
        <input class="in" id="phone" name="phone" type="tel" required inputmode="tel" autocomplete="tel" placeholder="예) 010-1234-5678" />
      </div>
      <div class="field">
        <label class="q" for="instagram">인스타그램 ID <span class="req">*</span></label>
        <input class="in" id="instagram" name="instagram" type="text" required placeholder="@아이디" />
      </div>
      <div class="field">
        <label class="q" for="address">거주지 <span class="req">*</span></label>
        <input class="in" id="address" name="address" type="text" required placeholder="예) 서울 성동구" />
      </div>
      <div class="field">
        <label class="q" for="education">학력 사항 <span class="req">*</span></label>
        <textarea class="in" id="education" name="education" required placeholder="재학 기간 / 학교명 / 전공"></textarea>
      </div>
      <div class="field">
        <label class="q" for="experience">경력 사항 <span class="req">*</span></label>
        <textarea class="in" id="experience" name="experience" required placeholder="근무 기간 / 근무처(지점 포함) / 주요 업무"></textarea>
      </div>
      <div class="field">
        <label class="q" for="certifications">자격 사항 <span class="req">*</span></label>
        <textarea class="in" id="certifications" name="certifications" required placeholder="취득일 / 자격증명 / 시행 기관"></textarea>
      </div>
    </div>

    <div class="sec">
      <h2>SELF-INTRODUCTION</h2>
      <div class="secsub">자기소개</div>

      <div class="field">
        <label class="q" for="personality">나의 성향과 성격 및 장단점 <span class="req">*</span></label>
        <textarea class="in" id="personality" name="personality" required></textarea>
      </div>
      <div class="field">
        <label class="q" for="appeal">시그니처 디자인과 차별화된 강점 <span class="req">*</span>
          <span class="hint">(예: 테크니션 · 감성 · 스타일 · 서비스)</span></label>
        <textarea class="in" id="appeal" name="appeal" required></textarea>
      </div>
      <div class="field">
        <label class="q" for="leanon_diff">타 브랜드와 비교했을 때 린온이 어떤 부분에서 다르다고 생각하여 지원하였나요? <span class="req">*</span></label>
        <textarea class="in" id="leanon_diff" name="leanon_diff" required></textarea>
      </div>
      <div class="field">
        <label class="q" for="important_factor">인생 가치관 또는 디자이너로서의 가치관 <span class="req">*</span></label>
        <textarea class="in" id="important_factor" name="important_factor" required></textarea>
      </div>
      <div class="field">
        <label class="q" for="career_goal">린온에서 디자이너로서 ‘어떻게’ 성장할 계획인지 <span class="req">*</span></label>
        <textarea class="in" id="career_goal" name="career_goal" required></textarea>
      </div>
    </div>

    <div class="consent">
      <div class="q">개인정보 수집 및 이용에 동의하시겠습니까?</div>
      <div class="note">지원서에 기재된 개인정보는 채용 전형 및 인재 관리 목적으로만 이용되며, 동의하지 않을 경우 지원 접수가 제한됩니다.</div>
      <div class="opts">
        <label class="chip"><input type="radio" name="consent" value="네" required><span>동의합니다</span></label>
        <label class="chip"><input type="radio" name="consent" value="아니오"><span>동의하지 않습니다</span></label>
      </div>
    </div>

    <div class="footer-tag">Curate your own vibe · LEANON</div>
  </form>
</div>

<div class="submitbar" id="submitbar">
  <div class="inner"><button class="submit" type="submit" form="hireForm" id="submitBtn">지원서 제출하기</button></div>
</div>

<div class="done" id="doneView">
  <h2>지원이 완료되었습니다</h2>
  <p>린온에 지원해 주셔서 감사합니다.<br/>서류 검토 후 개별적으로 연락드리겠습니다.</p>
</div>

<script>
  const SUPABASE_URL = "https://xnwvogewpcylxadhyrxa.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_PHHLnd7TlayrQANxrkpm4w_4FlD4I-6";
  const sb = SUPABASE_URL ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  const form = document.getElementById('hireForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (form.consent.value !== '네') { alert('개인정보 수집 및 이용에 동의해 주셔야 지원이 가능합니다.'); return; }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '제출 중...';
    const fd = new FormData(form);
    const payload = {
      name: fd.get('name'), birth_mbti: fd.get('birth_mbti'), phone: fd.get('phone'),
      instagram: fd.get('instagram'), address: fd.get('address'),
      education: fd.get('education'), experience: fd.get('experience'), certifications: fd.get('certifications'),
      personality: fd.get('personality'), appeal: fd.get('appeal'),
      leanon_diff: fd.get('leanon_diff'), important_factor: fd.get('important_factor'),
      career_goal: fd.get('career_goal'),
      consent: fd.get('consent') === '네', status: '대기', track: '디자이너'
    };
    try {
      if (sb) {
        const { error } = await sb.from('applications').insert(payload);
        if (error) throw new Error(error.message);
      } else {
        console.log('지원 데이터(미리보기):', payload);
      }
      document.getElementById('formView').style.display = 'none';
      document.getElementById('submitbar').style.display = 'none';
      document.getElementById('doneView').style.display = 'block';
      window.scrollTo(0, 0);
    } catch (err) {
      alert('제출 중 오류가 발생했습니다. 다시 시도해 주세요.\n' + err.message);
      btn.disabled = false; btn.textContent = '지원서 제출하기';
    }
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>LEANON 직원</title>
<meta name="description" content="LEANON 상담·채용 관리" />

<!-- PWA -->
<link rel="manifest" href="/app/manifest.webmanifest" />
<meta name="theme-color" content="#f2f0eb" />
<link rel="apple-touch-icon" href="/assets/app/icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="LEANON" />
<meta name="mobile-web-app-capable" content="yes" />

<style>
  :root{ --ink:#1a1a1a; --paper:#f2f0eb; --muted:#8c877d; --line:#e2ddd3; --card:#ffffff; }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    background:var(--paper); color:var(--ink); -webkit-font-smoothing:antialiased;
    padding:calc(env(safe-area-inset-top) + 46px) 22px calc(env(safe-area-inset-bottom) + 30px);
    display:flex; flex-direction:column; min-height:100%;
  }
  .head{text-align:center; margin-bottom:40px}
  .head img{height:40px; width:auto; margin:0 auto 14px; display:block}
  .head .slogan{font-style:italic; color:var(--muted); font-size:14px; letter-spacing:.02em}
  .tiles{display:flex; flex-direction:column; gap:14px; max-width:460px; width:100%; margin:0 auto}
  .tile{
    display:flex; align-items:center; gap:16px; text-decoration:none; color:inherit;
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    padding:22px 20px; transition:transform .12s ease, box-shadow .2s ease;
    box-shadow:0 1px 2px rgba(0,0,0,.03);
  }
  .tile:active{transform:scale(.985)}
  .tile .ico{
    flex:0 0 auto; width:52px; height:52px; border-radius:14px; background:var(--ink);
    color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px;
  }
  .tile .tx{flex:1 1 auto; min-width:0}
  .tile .tx h2{font-size:18px; font-weight:700; letter-spacing:-.01em}
  .tile .tx p{font-size:13.5px; color:var(--muted); margin-top:3px}
  .tile .arrow{flex:0 0 auto; color:var(--muted); font-size:20px}

  .foot{margin-top:auto; text-align:center; padding-top:34px}
  .foot .copy{font-size:11.5px; color:var(--muted); letter-spacing:.04em}

  /* 설치 안내 배너 */
  #installBar{
    display:none; max-width:460px; width:100%; margin:0 auto 14px;
    background:var(--ink); color:#fff; border-radius:14px; padding:14px 16px;
    align-items:center; gap:12px; font-size:13.5px; line-height:1.5;
  }
  #installBar b{font-weight:700}
  #installBar .x{margin-left:auto; opacity:.7; font-size:18px; cursor:pointer; padding:0 4px}
  #installBar button{
    border:none; background:#fff; color:var(--ink); border-radius:8px;
    padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
</style>
</head>
<body>

  <div class="head">
    <img src="/assets/brand/wordmark-dark.png" alt="LEANON"
         onerror="this.outerHTML='<div style=&quot;font-weight:800;letter-spacing:.28em;font-size:22px&quot;>LEANON</div>'" />
    <div class="slogan">Curate your own vibe</div>
  </div>

  <div id="installBar">
    <div id="installMsg"></div>
    <button id="installBtn" type="button">설치</button>
    <span class="x" onclick="document.getElementById('installBar').style.display='none'">✕</span>
  </div>

  <div class="tiles">
    <a class="tile" href="/consult_admin/">
      <div class="ico">📋</div>
      <div class="tx">
        <h2>상담 관리</h2>
        <p>고객 상담지 조회 · 디자이너 노트 · 상태 관리</p>
      </div>
      <div class="arrow">›</div>
    </a>
    <a class="tile" href="/hire_admin/">
      <div class="ico">🧑‍💼</div>
      <div class="tx">
        <h2>채용 관리</h2>
        <p>지원서 조회 · 합격/불합격 · 담당자 메모</p>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <div class="foot">
    <div class="copy">© LEANON · 직원 전용</div>
  </div>

<script>
  // 서비스워커 등록 (루트 스코프)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(() => {});
    });
  }

  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  const bar = document.getElementById('installBar');
  const msg = document.getElementById('installMsg');
  const btn = document.getElementById('installBtn');

  // 안드로이드/데스크톱 Chrome — 네이티브 설치 프롬프트
  let deferred = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferred = e;
    if (!isStandalone) {
      msg.innerHTML = '<b>홈 화면에 설치</b><br>앱처럼 전체화면으로 쓰세요';
      btn.style.display = '';
      bar.style.display = 'flex';
    }
  });
  btn.addEventListener('click', async () => {
    if (!deferred) return;
    deferred.prompt();
    await deferred.userChoice;
    deferred = null;
    bar.style.display = 'none';
  });

  // iOS Safari — beforeinstallprompt 미지원 → 수동 안내
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const inSafari = isIOS && !/crios|fxios|edgios/i.test(navigator.userAgent);
  if (isIOS && inSafari && !isStandalone) {
    msg.innerHTML = '<b>홈 화면에 추가</b><br>공유 <span style="font-size:15px">􀈂</span> → “홈 화면에 추가”를 누르면 앱이 돼요';
    btn.style.display = 'none';
    bar.style.display = 'flex';
  }
</script>
</body>
</html>

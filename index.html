<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>LEANON — 상담지</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    color-scheme:light;
    --ink:#1c1a17; --muted:#8a8377; --line:#e2ddd5; --bg:#ffffff; --radius:12px;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; margin:0 auto; padding:32px 22px 120px}
  .brand{text-align:center; margin-bottom:26px}
  .brand img{width:180px; max-width:60%; height:auto; display:block; margin:0 auto}
  .title{display:flex; align-items:baseline; justify-content:space-between; gap:10px;
         padding-bottom:12px; border-bottom:2px solid var(--ink); margin-top:22px}
  .title h1{font-size:20px; letter-spacing:3px; font-weight:700}
  .title span{font-size:11px; color:var(--muted); text-align:right; line-height:1.4}
  .sec{margin-top:30px}
  .sec > h2{font-size:13px; letter-spacing:2.5px; font-weight:700; margin-bottom:16px}
  .field{margin-bottom:20px}
  .field > label.q{display:block; font-size:14.5px; font-weight:600; margin-bottom:9px}
  .hint{color:var(--muted); font-weight:400; font-size:12px; margin-left:4px}
  .in{width:100%; border:none; border-bottom:1px solid var(--line); background:transparent;
      font-size:15px; padding:9px 2px; color:var(--ink); font-family:inherit}
  .in:focus{outline:none; border-bottom-color:var(--ink)}
  .row{display:flex; gap:12px}
  .row > *{flex:1}
  .inline{display:flex; align-items:center; gap:8px}
  .inline .in{flex:0 0 72px; text-align:center}
  .inline .unit{font-size:14px; color:var(--muted)}
  .opts{display:flex; flex-wrap:wrap; gap:8px}
  .chip{position:relative; border:1px solid var(--line); border-radius:999px;
        padding:10px 15px; font-size:14px; cursor:pointer; user-select:none; transition:.15s}
  .chip input{position:absolute; opacity:0; pointer-events:none}
  .chip:has(input:checked){background:var(--ink); color:#fff; border-color:var(--ink)}
  .chip.disabled{opacity:.35; pointer-events:none}
  textarea.in{border:1px solid var(--line); border-radius:var(--radius); min-height:78px; padding:12px; resize:vertical}
  .consent{margin-top:34px; padding-top:20px; border-top:1px solid var(--line)}
  .consent .q{font-size:14.5px; font-weight:600}
  .consent .note{color:var(--muted); font-size:12px; margin:6px 0 12px}
  .submitbar{position:fixed; left:0; right:0; bottom:0; background:var(--bg);
             border-top:1px solid var(--line); padding:14px 22px calc(14px + env(safe-area-inset-bottom));}
  .submitbar .inner{max-width:560px; margin:0 auto}
  button.submit{width:100%; border:none; border-radius:12px; background:var(--ink); color:#fff;
                font-size:16px; font-weight:700; padding:16px 0; cursor:pointer; font-family:inherit}
  button.submit:disabled{opacity:.4}
  .done{display:none; text-align:center; padding:80px 22px}
  .done h2{font-size:22px; margin-bottom:12px}
  .done p{color:var(--muted); font-size:15px; line-height:1.7}
  .footer-tag{text-align:center; margin-top:40px; color:var(--muted); font-size:12px; letter-spacing:.5px}
</style>
</head>

<div class="submitbar" id="submitbar">

<div class="done" id="doneView">
  <h2>제출이 완료되었습니다</h2>
  <p>소중한 답변 감사합니다.<br/>담당 디자이너가 확인 후 상담을 진행해 드릴게요.</p>
</div>

<script>
  document.querySelectorAll('.opts[data-max]').forEach(group => {
    const max = +group.dataset.max;
    group.addEventListener('change', () => {
      const boxes = [...group.querySelectorAll('input[type=checkbox]')];
      const checked = boxes.filter(b => b.checked).length;
      boxes.forEach(b => b.closest('.chip').classList.toggle('disabled', !b.checked && checked >= max));
    });
  });

  const SUPABASE_URL = "https://xnwvogewpcylxadhyrxa.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_PHHLnd7TlayrQANxrkpm4w_4FlD4I-6";
  const sb = SUPABASE_URL ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  const form = document.getElementById('consultForm');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '제출 중...';
    const fd = new FormData(form);
    const payload = {
      name: fd.get('name'), birth: fd.get('birth'),
      region_si: fd.get('region_si'), region_gu: fd.get('region_gu'),
      last_cut: fd.get('last_cut') ? Number(fd.get('last_cut')) : null,
      last_perm: fd.get('last_perm') ? Number(fd.get('last_perm')) : null,
      last_color: fd.get('last_color') ? Number(fd.get('last_color')) : null,
      color_type: fd.get('color_type'), reference: fd.get('reference'),
      today: fd.get('today'), length: fd.get('length'),
      image: fd.getAll('image'), concern: fd.getAll('concern'), styling: fd.getAll('styling'),
      past: fd.get('past'), consent: fd.get('consent') === '네', status: '대기'
    };
    try {
      if (sb) {
        const { error } = await sb.from('consultations').insert(payload);
        if (error) throw new Error(error.message);
      } else {
        console.log('제출 데이터(미리보기):', payload);
      }
      document.getElementById('formView').style.display = 'none';
      document.getElementById('submitbar').style.display = 'none';
      document.getElementById('doneView').style.display = 'block';
      window.scrollTo(0, 0);
    } catch (err) {
      alert('제출 중 오류가 발생했습니다. 다시 시도해 주세요.\n' + err.message);
      btn.disabled = false; btn.textContent = '제출하기';
    }
  });
</script>
